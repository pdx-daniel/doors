services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: doors
      POSTGRES_PASSWORD: doors
      POSTGRES_DB: doors
    volumes:
      - doors_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U doors -d doors']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  doors_pgdata:
